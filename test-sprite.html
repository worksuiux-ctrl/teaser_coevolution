<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Sprite</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0c0c0e; color: #f5f5f7;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  }
  canvas { display: block; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: #0c0c0e; max-width: 90vw; max-height: 60vh; }
  .info { display: flex; gap: 24px; font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 0.05em; font-family: ui-monospace, monospace; }
  .info span { color: #9BCE6A; }
  .status { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; text-transform: uppercase; }
  .bad { color: #FF5848; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="info"><div>Frame <span id="fn">0</span>/<span id="ft">0</span></div></div>
<div class="status" id="s">Cargando...</div>
<script>
(async function() {
  const c = document.getElementById('c'), ctx = c.getContext('2d');
  const elFn = document.getElementById('fn'), elFt = document.getElementById('ft'), elS = document.getElementById('s');
  let d;
  try { d = await (await fetch('assets/idle-0.json')).json(); } catch(e) { elS.textContent='ERROR'; elS.classList.add('bad'); return; }
  const keys = Object.keys(d.frames).sort();
  const total = keys.length;
  const srcSize = d.frames[keys[0]].sourceSize;
  elFt.textContent = total;
  const img = new Image();
  img.onload = start;
  img.onerror = () => { elS.textContent='ERROR img'; elS.classList.add('bad'); };
  img.src = 'assets/texrure file/image-0.png';
  function start() {
    elS.textContent = 'Reproduciendo'; elS.style.color = '#9BCE6A';
    const sc = Math.min(1, (innerWidth * 0.8) / srcSize.w, (innerHeight * 0.5) / srcSize.h);
    const W = Math.round(srcSize.w * sc), H = Math.round(srcSize.h * sc);
    c.width = W; c.height = H;
    let idx = 0, last = 0;
    function draw(i) {
      ctx.clearRect(0, 0, W, H);
      const f = d.frames[keys[i]]; if (!f) return;
      const fr = f.frame, off = f.spriteSourceSize;
      ctx.save();
      if (f.rotated) {
        ctx.translate(off.x * sc, (off.y + fr.w) * sc);
        ctx.rotate(-Math.PI / 2);
        ctx.drawImage(img, fr.x, fr.y, fr.w, fr.h, 0, 0, fr.w * sc, fr.h * sc);
      } else {
        ctx.drawImage(img, fr.x, fr.y, fr.w, fr.h, off.x * sc, off.y * sc, fr.w * sc, fr.h * sc);
      }
      ctx.restore();
    }
    function loop(time) {
      if (time - last >= 1000 / 30) { draw(idx); elFn.textContent = idx; idx = (idx + 1) % total; last = time; }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  }
})();
</script>
</body>
</html>
