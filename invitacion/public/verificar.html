<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c0c0e">
<title>COE Evolution · Verificación</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  min-height: 100vh;
  background: #0c0c0e;
  color: #f5f5f7;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

:root {
  --bg: #0c0c0e;
  --bg-elevated: #18181b;
  --bg-card: #1f1f23;
  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.14);
  --text: #f5f5f7;
  --text-muted: rgba(245, 245, 247, 0.55);
  --text-dim: rgba(245, 245, 247, 0.35);
  --accent: #88C63A;
  --accent-bright: #9BCE6A;
  --accent-deep: #267335;
  --success: #42AA42;
  --success-bg: rgba(66, 170, 66, 0.15);
  --danger: #FF5848;
  --danger-bg: rgba(255, 88, 72, 0.15);
  --warning: #FF9E03;
  --warning-bg: rgba(255, 158, 3, 0.15);
  --glow: rgba(132, 194, 55, 0.25);
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  min-height: 100dvh;
}

.container {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  text-align: center;
}

/* Scanner */
.scanner-wrap {
  width: 100%;
  aspect-ratio: 1;
  max-width: 300px;
  background: #000;
  border-radius: 18px;
  overflow: hidden;
  position: relative;
  border: 2px solid var(--border);
}

.scanner-wrap video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.scanner-overlay {
  position: absolute;
  inset: 0;
  border: 3px solid var(--accent);
  border-radius: 12px;
  margin: 32px;
  box-shadow: 0 0 30px var(--glow), inset 0 0 30px rgba(132,194,55,0.05);
  pointer-events: none;
  animation: scanPulse 2s ease-in-out infinite;
}

.scanner-hint {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}

/* Card de resultado */
.result-card {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  animation: fadeUp 0.5s var(--ease-out-expo) forwards;
}

.result-icon {
  width: 48px; height: 48px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}

.result-icon.success { background: var(--success-bg); color: var(--accent-bright); }
.result-icon.error { background: var(--danger-bg); color: var(--danger); }
.result-icon.warn { background: var(--warning-bg); color: var(--warning); }

.result-name {
  font-size: 24px;
  font-weight: 600;
}

.result-detail {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.5;
}

.result-detail span { color: var(--text-dim); display: block; font-size: 12px; margin-top: 2px; }

.result-badge {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 100px;
  font-weight: 600;
}

.result-badge.present { background: var(--success-bg); color: var(--accent-bright); }
.result-badge.used { background: var(--danger-bg); color: var(--danger); }
.result-badge.pending { background: var(--warning-bg); color: var(--warning); }

/* Botón marcar presente */
.action-btn {
  width: 100%;
  background: var(--accent);
  color: #0c0c0e;
  border: none;
  border-radius: 14px;
  padding: 16px;
  font-size: 16px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 4px;
}

.action-btn:active { transform: scale(0.98); opacity: 0.9; }
.action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.action-btn.secondary {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--text);
}

.action-btn.secondary:active { border-color: var(--accent); }

.action-btn .spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(12,12,14,0.3);
  border-top-color: #0c0c0e;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

.action-btn.loading .spinner { display: block; }
.action-btn.loading .btn-text { display: none; }

/* Spinner de carga */
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* Estados */
.state { display: none; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
.state.visible { display: flex; }

.state-header {
  font-size: 15px;
  font-weight: 500;
}

.state-sub {
  font-size: 13px;
  color: var(--text-muted);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes scanPulse {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}
@keyframes fadeOut {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.5); }
}

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  width: 100%;
}

.tab {
  flex: 1;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 10px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s ease;
}

.tab.active {
  background: var(--accent);
  color: #0c0c0e;
  border-color: var(--accent);
}

/* Lista de invitados */
.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}

.guest-list {
  width: 100%;
  max-height: 60vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.guest-list::-webkit-scrollbar {
  width: 4px;
}

.guest-list::-webkit-scrollbar-thumb {
  background: var(--border-strong);
  border-radius: 4px;
}

.guest-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  text-align: left;
  animation: fadeUp 0.3s var(--ease-out-expo) forwards;
}

.guest-card .avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  flex-shrink: 0;
}

.guest-card .avatar.present { background: var(--success-bg); color: var(--accent-bright); }
.guest-card .avatar.pending { background: var(--warning-bg); color: var(--warning); }

.guest-card .info {
  flex: 1;
  min-width: 0;
}

.guest-card .info .name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

.guest-card .info .detail {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.guest-card .status-badge {
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 100px;
  font-weight: 600;
  flex-shrink: 0;
}

.guest-card .status-badge.present { background: var(--success-bg); color: var(--accent-bright); }
.guest-card .status-badge.pending { background: var(--warning-bg); color: var(--warning); }
</style>
</head>
<body>

<div class="container">

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="scan">📷 Escanear</button>
    <button class="tab" data-tab="list">📋 Lista</button>
  </div>

  <!-- Estado: ESCANEANDO (cámara activa) -->
  <div class="state visible" id="stateScan">
    <div class="scanner-wrap" id="scannerWrap">
      <video id="camera" playsinline muted></video>
      <div class="scanner-overlay"></div>
    </div>
    <p class="scanner-hint">Apunta al código QR del invitado</p>

    <details style="width:100%;cursor:pointer;border:1px solid var(--border);border-radius:14px;padding:12px;background:var(--bg-elevated);color:var(--text-muted);font-size:13px">
      <summary style="font-weight:500;color:var(--text-muted)">⌨ Ingresar código manual</summary>
      <div style="display:flex;gap:8px;margin-top:12px">
        <input id="manualInput" type="text" placeholder="Pega el código aquí" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:14px;font-family:"SF Mono",monospace;color:var(--text);outline:none;letter-spacing:0.1em">
        <button id="manualBtn" style="background:var(--accent);color:#0c0c0e;border:none;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Verificar</button>
      </div>
    </details>
  </div>

  <!-- Estado: CARGANDO -->
  <div class="state" id="stateLoading">
    <div class="loading-spinner"></div>
    <p class="state-header">Verificando código...</p>
    <button class="action-btn secondary" onclick="location.reload()">
      <span class="btn-text">↻ Reintentar</span>
    </button>
  </div>

  <!-- Estado: LISTA DE INVITADOS -->
  <div class="state" id="stateList">
    <div class="list-header">
      <p class="state-header" id="listCount"></p>
      <button class="action-btn secondary" style="padding:8px 16px;font-size:13px;width:auto" onclick="cargarLista()">
        ↻ Actualizar
      </button>
    </div>
    <div class="guest-list" id="guestList"></div>
  </div>

  <!-- Estado: INVITADO ENCONTRADO (no usado aún) -->
  <div class="state" id="stateFound">
    <div class="result-card">
      <div class="result-icon success">✓</div>
      <div class="result-name" id="foundName"></div>
      <div class="result-detail">
        <div id="foundCargo"></div>
        <span id="foundCorreo"></span>
      </div>
      <div class="result-badge pending">Pendiente</div>
    </div>
    <button class="action-btn" id="markBtn">
      <span class="spinner"></span>
      <span class="btn-text">✓ Marcar como presente</span>
    </button>
  </div>

  <!-- Estado: CÓDIGO YA USADO -->
  <div class="state" id="stateUsed">
    <div class="result-card">
      <div class="result-icon error">!</div>
      <div class="result-name" id="usedName"></div>
      <div class="result-detail">
        Este código ya fue utilizado.
        <span id="usedTime"></span>
      </div>
      <div class="result-badge used">Ya presente</div>
    </div>
    <button class="action-btn secondary" onclick="resetScanner()">
      <span class="btn-text">↻ Escanear otro</span>
    </button>
  </div>

  <!-- Estado: CÓDIGO NO VÁLIDO -->
  <div class="state" id="stateInvalid">
    <div class="result-card">
      <div class="result-icon error">✕</div>
      <div class="result-name">Código no válido</div>
      <div class="result-detail">Este código no corresponde a ningún invitado registrado.</div>
    </div>
    <button class="action-btn secondary" onclick="resetScanner()">
      <span class="btn-text">↻ Intentar de nuevo</span>
    </button>
  </div>

  <!-- Estado: CONFIRMADO -->
  <div class="state" id="stateConfirmed">
    <div class="result-card">
      <div class="result-icon success">✓</div>
      <div class="result-name" id="confirmedName"></div>
      <div class="result-detail">Asistencia registrada correctamente.</div>
      <div class="result-badge present">Presente</div>
    </div>
    <button class="action-btn secondary" onclick="resetScanner()">
      <span class="btn-text">↻ Escanear otro</span>
    </button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://avqfndjpkfegfpoqyxeg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2cWZuZGpwa2ZlZ2Zwb3F5eGVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzU3OTQsImV4cCI6MjA5NDk1MTc5NH0.aBsVuz6Es4jwgpFihqKhRUVuxsKmskEgk5gmmvxSSVc';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const states = {};
['stateScan','stateLoading','stateList','stateFound','stateUsed','stateInvalid','stateConfirmed']
  .forEach(id => states[id] = document.getElementById(id));

function showState(id) {
  Object.values(states).forEach(s => s.classList.remove('visible'));
  states[id].classList.add('visible');
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    if (tab.dataset.tab === 'list') {
      stopCamera();
      showState('stateList');
      cargarLista();
    } else {
      showState('stateScan');
      startCamera();
    }
  });
});

const video = document.getElementById('camera');
let scanning = false;
let stream = null;
let currentUid = null;

function startCamera() {
  if (stream) return;
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } }
  }).then(s => {
    stream = s;
    video.srcObject = s;
    video.play();
    scanning = true;
    scanFrame();
  }).catch(() => {});
}

// Tap para enfocar
function setupTapFocus() {
  const wrap = document.getElementById('scannerWrap');
  wrap.addEventListener('click', (e) => {
    const rect = wrap.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    // Animación visual del foco
    const ring = document.createElement('div');
    ring.style.cssText = `
      position:absolute;left:${x - 20}px;top:${y - 20}px;
      width:40px;height:40px;border:2px solid rgba(136,198,58,.8);
      border-radius:50%;pointer-events:none;z-index:10;
      animation:fadeOut .5s ease forwards;
    `;
    wrap.appendChild(ring);
    setTimeout(() => ring.remove(), 600);

    // Intentar enfocar si hay cámara activa
    if (stream) {
      const track = stream.getVideoTracks()[0];
      try {
        const cap = track.getCapabilities && track.getCapabilities();
        if (cap && cap.focusMode && cap.focusMode.includes('single-shot')) {
          track.applyConstraints({ advanced: [{ focusMode: 'single-shot' }] });
        }
      } catch {}
    }
  });
}
setupTapFocus();

function scanFrame() {
  if (!scanning) return;
  if (video.readyState !== video.HAVE_ENOUGH_DATA) {
    requestAnimationFrame(scanFrame);
    return;
  }

  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });

  if (code) {
    try {
      const url = new URL(code.data);
      const uid = url.searchParams.get('uid');
      if (uid) {
        scanning = false;
        stopCamera();
        verificar(uid);
        return;
      }
    } catch {}
  }

  requestAnimationFrame(scanFrame);
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  video.srcObject = null;
}

function resetScanner() {
  showState('stateScan');
  scanning = true;
  startCamera();
}

// Cargar lista de invitados desde Supabase
async function cargarLista() {
  const listEl = document.getElementById('guestList');
  const countEl = document.getElementById('listCount');
  listEl.innerHTML = '<div class="loading-spinner" style="margin:40px auto"></div>';
  try {
    const { data, error } = await supabaseClient
      .from('invitados')
      .select('nombre, cargo, organizacion, usado, timestamp')
      .order('usado', { ascending: true })
      .order('timestamp', { ascending: true });

    if (error) throw error;

    const presentes = data.filter(g => g.usado);
    const pendientes = data.filter(g => !g.usado);
    countEl.textContent = `🎫 ${data.length} · ${presentes.length} presentes · ${pendientes.length} pendientes`;

    listEl.innerHTML = '';
    data.forEach((g, i) => {
      const card = document.createElement('div');
      card.className = 'guest-card';
      card.style.animationDelay = `${i * 30}ms`;
      const inicial = g.nombre.charAt(0).toUpperCase();
      card.innerHTML = `
        <div class="avatar ${g.usado ? 'present' : 'pending'}">${inicial}</div>
        <div class="info">
          <div class="name">${g.nombre}</div>
          <div class="detail">${[g.cargo, g.organizacion].filter(Boolean).join(' · ')}</div>
        </div>
        <div class="status-badge ${g.usado ? 'present' : 'pending'}">${g.usado ? 'Presente' : 'Pendiente'}</div>
      `;
      listEl.appendChild(card);
    });
  } catch (err) {
    listEl.innerHTML = '<p class="state-sub">Error al cargar la lista</p>';
  }
}

// Verificar UID contra Supabase
async function verificar(uid) {
  currentUid = uid;
  showState('stateLoading');

  // Timeout 8s para no quedarse colgado
  const timeout = new Promise((_, reject) =>
    setTimeout(() => reject(new Error('Timeout')), 8000)
  );

  try {
    const { data, error } = await Promise.race([
      supabaseClient
        .from('invitados')
        .select('*')
        .eq('uid', uid)
        .single(),
      timeout
    ]);

    if (error || !data) {
      showState('stateInvalid');
      return;
    }

    if (data.usado) {
      document.getElementById('usedName').textContent = data.nombre;
      document.getElementById('usedTime').textContent = data.usado_en
        ? 'Usado: ' + new Date(data.usado_en).toLocaleString('es-ES')
        : '';
      showState('stateUsed');
      return;
    }

    document.getElementById('foundName').textContent = data.nombre;
    document.getElementById('foundCargo').textContent = data.cargo || '';
    document.getElementById('foundCorreo').textContent = data.correo;
    showState('stateFound');

  } catch (err) {
    showState('stateInvalid');
  }
}

document.getElementById('markBtn').addEventListener('click', async function() {
  const uid = currentUid;
  if (!uid) return;

  this.classList.add('loading');
  this.disabled = true;

  try {
    const { data, error } = await supabaseClient
      .from('invitados')
      .update({ usado: true, usado_en: new Date().toISOString() })
      .eq('uid', uid)
      .eq('usado', false)
      .select()
      .single();

    if (error || !data) {
      // Puede que ya esté usado (otra pestaña lo marcó)
      const { data: check } = await supabaseClient
        .from('invitados')
        .select('nombre, usado_en')
        .eq('uid', uid)
        .single();

      if (check && check.usado_en) {
        document.getElementById('usedName').textContent = check.nombre;
        document.getElementById('usedTime').textContent = 'Usado: ' + new Date(check.usado_en).toLocaleString('es-ES');
        showState('stateUsed');
      } else {
        showState('stateInvalid');
      }
      return;
    }

    document.getElementById('confirmedName').textContent = data.nombre;
    showState('stateConfirmed');

  } catch (err) {
    showState('stateInvalid');
  }
});

const urlUid = new URL(window.location.href).searchParams.get('uid');
if (urlUid) {
  verificar(urlUid);
} else {
  startCamera();
}

window.addEventListener('beforeunload', stopCamera);

// Manual code entry
document.getElementById('manualBtn').addEventListener('click', () => {
  const val = document.getElementById('manualInput').value.trim();
  if (val) {
    stopCamera();
    scanning = false;
    verificar(val);
  }
});
document.getElementById('manualInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('manualBtn').click();
});
</script>
</body>
</html>
