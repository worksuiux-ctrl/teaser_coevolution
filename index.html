<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c0c0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="COE Evolution">
<title>COE Evolution</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  min-height: 100vh;
  background: #0c0c0e;
  color: #f5f5f7;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

:root {
  --bg: #0c0c0e;
  --bg-elevated: #18181b;
  --bg-card: #1f1f23;
  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.14);
  --text: #f5f5f7;
  --text-muted: rgba(245, 245, 247, 0.55);
  --text-dim: rgba(245, 245, 247, 0.35);
  --coe-green-450: #88C63A;
  --coe-green-300: #9BCE6A;
  --accent: var(--coe-green-450);
  --accent-bright: var(--coe-green-300);
  --glow: rgba(132, 194, 55, 0.25);
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  min-height: 100dvh;
}

.container {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}

.hero {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.hero-icon {
  width: 56px;
  height: 56px;
  object-fit: contain;
  margin-bottom: 16px;
}

.hero-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: 0.03em;
  color: #88C63A;
  text-shadow: 0 0 40px rgba(136,198,58,0.15);
}

.hero-year {
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.3em;
  color: rgba(245,245,247,0.3);
  margin-top: 8px;
}

.hero-sub {
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: #f5f5f7;
  margin-top: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(136,198,58,0.15);
}

.proto-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 36px;
  background: #88C63A;
  color: #0c0c0e;
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  border-radius: 10px;
  letter-spacing: 0.03em;
  transition: transform 0.2s var(--ease-out-expo), box-shadow 0.2s var(--ease-out-expo);
  box-shadow: 0 0 30px rgba(136,198,58,0.15);
}
.proto-btn:hover {
  transform: scale(1.03);
  box-shadow: 0 0 40px rgba(136,198,58,0.3);
}
.proto-btn:active {
  transform: scale(0.97);
}



#bgGrid {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

body > * { position: relative; z-index: 1; }
</style>
</head>
<body>

<canvas id="bgGrid"></canvas>

<div class="container">

  <div class="hero">
    <img class="hero-icon" src="assets/Icono%20coe.png" alt="COE">
    <div class="hero-title">COE EVOLUTION</div>
    <div class="hero-year">2026</div>
  </div>

  <!-- Botón Ver Prototipo deshabilitado temporalmente -->
  <!--
  <a class="proto-btn" href="prototipotesting2026/">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Ver Prototipo
  </a>
  -->

</div>

<script>
(function(){
  const c = document.getElementById('bgGrid');
  const ctx = c.getContext('2d');
  let particles = [];
  const isMobile = window.innerWidth < 600;
  const COUNT = isMobile ? 25 : 55;
  const CONN_DIST = isMobile ? 150 : 200;
  const LINE_ALPHA = 0.45;

  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  window.addEventListener('load', resize);
  resize();

  class P {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * c.width;
      this.y = Math.random() * c.height;
      this.vx = (Math.random() - 0.5) * 0.2;
      this.vy = (Math.random() - 0.5) * 0.2;
    }
    update() {
      this.x += this.vx; this.y += this.vy;
      if (this.x < 0 || this.x > c.width) this.vx *= -1;
      if (this.y < 0 || this.y > c.height) this.vy *= -1;
    }
  }

  for (let i = 0; i < COUNT; i++) particles.push(new P());

  const rmq = matchMedia('(prefers-reduced-motion: reduce)');

  function draw() {
    const w = c.width, h = c.height;
    ctx.clearRect(0, 0, w, h);

    if (!rmq.matches) particles.forEach(p => p.update());

    for (let i = 0; i < COUNT; i++) {
      for (let j = i + 1; j < COUNT; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < CONN_DIST) {
          const alpha = (1 - dist / CONN_DIST) * LINE_ALPHA;
          ctx.strokeStyle = `rgba(136,198,58,${alpha})`;
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }

    particles.forEach(p => {
      ctx.fillStyle = 'rgba(136,198,58,0.5)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
      ctx.fill();
    });

    if (!rmq.matches) requestAnimationFrame(draw);
  }

  draw();

  window.addEventListener('resize', () => {
    particles.forEach(p => {
      if (p.x > c.width || p.y > c.height) p.reset();
    });
  });
})();
</script>
</body>
</html>
